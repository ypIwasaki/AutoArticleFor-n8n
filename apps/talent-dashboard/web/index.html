<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f4f6f8">
    <title>Talent Index</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="dashboard">
    <header class="topbar">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">TI</div>
        <div>
          <p class="eyebrow">AUTO ARTICLE / N8N</p>
          <h1>Talent Index</h1>
        </div>
      </div>
      <nav class="primary-nav" aria-label="主要ナビゲーション">
        <a class="nav-link is-active" href="index.html" aria-current="page">ダッシュボード</a>
        <a class="nav-link" href="talents.html">タレント</a>
        <a class="nav-link" href="articles.html">記事</a>
        <a class="nav-link" href="keywords.html">キーワード</a>
        <a class="nav-link" href="keyword-candidates.html">AI候補</a>
      </nav>
      <div class="topbar-actions">
        <span id="source-badge" class="source-badge">Loading</span>
        <span id="generated-at" class="generated-at"></span>
        <button id="reload-button" class="icon-button" type="button" title="データを再読み込み" aria-label="データを再読み込み">↻</button>
      </div>
    </header>

    <main>
      <section class="overview" aria-labelledby="overview-heading">
        <div class="overview-copy">
          <p class="eyebrow">MONITORING OVERVIEW</p>
          <h2 id="overview-heading">保存済みの記事とタレント候補</h2>
          <p>AIレビュー済みの根拠をもとに、記事・タレント・関係データを確認します。</p>
        </div>
        <div class="metrics" aria-label="集計">
          <div class="metric"><span>タレント候補</span><strong id="metric-talents">-</strong></div>
          <div class="metric"><span>記事</span><strong id="metric-articles">-</strong></div>
          <div class="metric"><span>記事との関係</span><strong id="metric-relations">-</strong></div>
          <div class="metric"><span>AI要約済み</span><strong id="metric-summaries">-</strong></div>
        </div>
        <div class="activity-panel">
          <div class="panel-heading">
            <span>取得記事量</span>
            <span id="activity-range" class="muted"></span>
          </div>
          <canvas id="activity-chart" width="700" height="118" aria-label="日別の記事数"></canvas>
        </div>
      </section>

      <p id="data-notice" class="data-notice" hidden></p>

      <section class="workspace" aria-label="データ閲覧">
        <aside class="filter-panel" aria-label="絞り込み">
          <div class="panel-heading"><span>絞り込み</span><button id="clear-filters" type="button" class="text-button">解除</button></div>
          <label>
            <span>検索</span>
            <input id="search-input" type="search" placeholder="名前、記事、根拠を検索">
          </label>
          <label>
            <span>状態</span>
            <select id="status-filter">
              <option value="">すべて</option>
              <option value="pending">pending</option>
              <option value="approved">approved</option>
              <option value="rejected">rejected</option>
            </select>
          </label>
          <label>
            <span>事務所・組織</span>
            <select id="organization-filter"><option value="">すべて</option></select>
          </label>
          <label>
            <span>最低信頼度 <output id="confidence-value">0.00</output></span>
            <input id="confidence-filter" type="range" min="0" max="1" step="0.05" value="0">
          </label>
          <label class="toggle-row">
            <input id="linked-only" type="checkbox">
            <span>関係のある記事だけ</span>
          </label>
          <label class="toggle-row">
            <input id="summarized-only" type="checkbox">
            <span>AI要約あり</span>
          </label>
        </aside>

        <section class="data-panel" aria-live="polite">
          <div class="view-tabs" role="tablist" aria-label="データ種別">
            <button class="tab-button is-active" type="button" role="tab" data-view="talents" aria-selected="true">タレント</button>
            <button class="tab-button" type="button" role="tab" data-view="articles" aria-selected="false">記事</button>
            <button class="tab-button" type="button" role="tab" data-view="relations" aria-selected="false">関係</button>
          </div>
          <div class="table-toolbar">
            <div><span id="view-title">タレント一覧</span><span id="result-count" class="result-count"></span></div>
            <span id="sort-note" class="muted">最新の情報を優先表示</span>
          </div>
          <div class="table-scroll">
            <table id="data-table">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <aside id="detail-panel" class="detail-panel" aria-label="詳細">
          <div class="panel-heading"><span>詳細</span><button id="close-detail" class="icon-button small" type="button" title="詳細を閉じる" aria-label="詳細を閉じる">×</button></div>
          <div id="detail-content" class="detail-content">
            <p class="empty-detail">選択なし</p>
          </div>
        </aside>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
